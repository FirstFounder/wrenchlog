services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

  api:
    build: ../apps/api
    container_name: wrenchlog-api
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
    restart: unless-stopped
    networks:
      - internal
      - caddy_proxy

  web:
    build: ../apps/web
    container_name: wrenchlog-web
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - internal
      - caddy_proxy

volumes:
  postgres_data:

networks:
  internal:
  caddy_proxy:
    external: true
